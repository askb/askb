# SPDX-FileCopyrightText: 2025 The Linux Foundation

name: Update Profile

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday at 00:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: 'recursive'

      - name: Setup Python
        # yamllint disable-line rule:line-length
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip3 install graph-cli
          sudo apt-get update -qq
          sudo apt-get install -y jq

      - name: Collect contribution data
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: bash -x ./collect_data.sh 100

      - name: Build README
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: bash -x ./build.sh

      - name: Commit changes
        # yamllint disable-line rule:line-length
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
        with:
          commit_user_email: 'askb23@gmail.com'
          commit_user_name: 'Anil Belur'
          commit_message: 'Chore: automatic profile update'
          file_pattern: 'README.md graph.png contributions.csv'
          add_options: '-f'
          push_options: '--force'

      - name: Summary
        run: echo "✅ Profile updated successfully"
